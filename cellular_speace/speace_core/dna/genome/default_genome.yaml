# T-DNA — Neural Periodic Table genes
# These expressions drive the mathematical laws of the periodic table
# instead of hard-coding them in Python. Variables:
#   g = normalized group position (0..1)
#   p = normalized period position (0..1)
periodic_table_genes:
  enabled: true
  trends:
    electronegativity:
      name: "Electronegativity"
      description: "Inhibition tendency; increases across period, decreases down group"
      across_period: "min(1.0, 0.15 + g * 0.85)"
      down_group: "max(0.1, 1.0 - p * 0.6)"
      noise_amplitude: 0.05
    ionization_energy:
      name: "Ionization Energy"
      description: "Activation threshold; increases across period, decreases down group"
      across_period: "min(1.0, 0.2 + g * 0.8)"
      down_group: "max(0.15, 1.0 - p * 0.5)"
      noise_amplitude: 0.05
    atomic_radius:
      name: "Atomic Radius"
      description: "Receptive field size; decreases across period, increases down group"
      across_period: "max(0.1, 1.0 - g * 0.7)"
      down_group: "min(1.0, 0.2 + p * 0.8)"
      noise_amplitude: 0.05
    plasticity:
      name: "Neural Plasticity"
      description: "Ability to change; peaks in middle periods"
      across_period: "0.3 + 0.5 * (1.0 - abs(g - 0.5) * 2.0)"
      down_group: "0.2 + 0.6 * (1.0 - abs(p - 0.4) * 1.5)"
      noise_amplitude: 0.05
    metabolic_cost:
      name: "Metabolic Cost"
      description: "Energy consumption; increases with period depth"
      across_period: "0.2 + g * 0.3"
      down_group: "0.2 + p * 0.7"
      noise_amplitude: 0.05
    myelination_potential:
      name: "Myelination Potential"
      description: "Tendency to be myelinated in stable pathways"
      across_period: "0.3 + 0.5 * (1.0 - abs(g - 0.4))"
      down_group: "max(0.1, 0.8 - p * 0.5)"
      noise_amplitude: 0.05
  valence_rules:
    - name: "Octet Rule"
      description: "Excitatory neurons preferentially connect to ~7-9 targets"
      condition: "source.is_excitatory() and target.is_inhibitory()"
      result:
        max_connections: 8
        bond_type: "covalent"
    - name: "Complementary Valence"
      description: "Excitatory→Inhibitory pairs form strong, stable connections"
      condition: "source.is_excitatory() and target.is_inhibitory()"
      result:
        compatibility_boost: 0.3
        bond_type: "ionic"
    - name: "Like-Valence Repulsion"
      description: "Inhibitory→Inhibitory pairs are rare and weak"
      condition: "source.is_inhibitory() and target.is_inhibitory()"
      result:
        compatibility_penalty: -0.3
        max_strength: 0.3
    - name: "Modulatory Gating"
      description: "Modulatory elements gate excitatory→inhibitory pairs"
      condition: "source.is_modulatory() or target.is_modulatory()"
      result:
        bond_type: "hydrogen"
        plasticity_boost: 0.2
    - name: "Hierarchical Feedforward"
      description: "Lower period → higher period forms feedforward pathways"
      condition: "source.period.value < target.period.value"
      result:
        polarity: "forward"
        direction_boost: 0.2
    - name: "Hierarchical Feedback"
      description: "Higher period → lower period forms feedback pathways"
      condition: "source.period.value > target.period.value"
      result:
        polarity: "backward"
        direction_boost: 0.15
    - name: "Same-Group Resonance"
      description: "Same-group elements form recurrent/resonant connections"
      condition: "source.group == target.group and source.atomic_number != target.atomic_number"
      result:
        bond_type: "metallic"
        polarity: "recurrent"
    - name: "Glial Inertness"
      description: "Glial elements do not form strong directed bonds"
      condition: "source.block.value == 'g' or target.block.value == 'g'"
      result:
        bond_type: "van_der_waals"
        max_strength: 0.2
    - name: "Cross-Block Modulation"
      description: "D-block elements modulate P-block and S-block connections"
      condition: "source.block.value == 'd' and target.block.value in ('p', 's')"
      result:
        bond_type: "hydrogen"
        modulation_factor: 0.3
  reaction_rules:
    - name: "Sensory Integration"
      description: "Sensory input + feature extraction → feature detection"
      reactants: ["Ph", "Sc"]
      products: ["Cc"]
      energy_barrier: 0.3
      rate_constant: 0.5
    - name: "Auditory Comprehension"
      description: "Auditory + Wernicke → semantic comprehension"
      reactants: ["Hc", "Au", "We"]
      products: ["Sp"]
      energy_barrier: 0.4
      rate_constant: 0.3
    - name: "Memory Formation"
      description: "Hippocampal + entorhinal + dentate → memory binding"
      reactants: ["Hp", "En", "Dg"]
      products: ["Dm"]
      energy_barrier: 0.5
      rate_constant: 0.2
    - name: "Executive Decision"
      description: "Prefrontal + limbic → executive command"
      reactants: ["Pf", "Lb"]
      products: ["Mo"]
      catalyst: "Dp"
      energy_barrier: 0.6
      rate_constant: 0.4
    - name: "Motor Correction"
      description: "Motor + cerebellar → refined motor output"
      reactants: ["Mo", "Cb"]
      products: ["Mo"]
      energy_barrier: 0.35
      rate_constant: 0.6
    - name: "Inhibitory Gating"
      description: "Inhibitory interneuron gates any excitatory signal"
      reactants: ["Sc", "In"]
      products: []
      energy_barrier: 0.2
      rate_constant: 0.7
    - name: "Dopaminergic Facilitation"
      description: "Dopamine facilitates prefrontal→motor planning"
      reactants: ["Pf", "Mo"]
      products: ["Mo"]
      catalyst: "Dp"
      energy_barrier: 0.3
      rate_constant: 0.5
    - name: "Serotonergic Regulation"
      description: "Serotonin modulates limbic→prefrontal valence"
      reactants: ["Lb", "Pf"]
      products: ["Pf"]
      catalyst: "Sr"
      energy_barrier: 0.4
      rate_constant: 0.3
    - name: "Default Mode Reflection"
      description: "Hippocampal→default mode during offline periods"
      reactants: ["Hp", "Dm"]
      products: ["Dm"]
      energy_barrier: 0.5
      rate_constant: 0.2
    - name: "Astrocytic Support"
      description: "Astrocyte regulates energy in any active circuit"
      reactants: ["Pf", "As"]
      products: ["Pf"]
      energy_barrier: 0.1
      rate_constant: 0.3
  default_bond_energy: 0.5
  default_bond_plasticity: 0.5


# T-FAG — Functional Activation Gate (lazy on-demand neural sub-functions)
functional_activation:
  enabled: true
  rules:
    - rule_id: "sensory_input"
      description: "Enable sensory encoding when a sensory signal arrives"
      trigger_meanings: ["sensory", "visual", "auditory", "somatosensory"]
      trigger_tags: ["input"]
      min_strength: 0.0
      activate_latent_state: "sensory_encoding"
      latent_state_weight: 0.7
      enable_wave: true
      wave_frequency: 20.0
    - rule_id: "language_input"
      description: "Enable linguistic processing on language signals"
      trigger_meanings: ["phoneme", "word", "syntax", "semantic"]
      trigger_tags: ["language"]
      min_strength: 0.0
      activate_latent_state: "linguistic_processing"
      latent_state_weight: 0.6
      activate_receptor_profile: "excitatory"
      plasticity_delta: 0.02
    - rule_id: "inhibitory_gating"
      description: "Switch to inhibitory mode on gating signals"
      trigger_meanings: ["inhibit", "gate", "suppress"]
      trigger_tags: ["regulation"]
      min_strength: 0.1
      activate_receptor_profile: "inhibitory"
      threshold_delta: -0.1
    - rule_id: "memory_consolidation"
      description: "Enable memory-related latent state on consolidation cues"
      trigger_meanings: ["consolidate", "memory", "replay"]
      trigger_tags: ["hippocampus"]
      min_strength: 0.0
      activate_latent_state: "memory_trace"
      latent_state_weight: 0.5
      wave_frequency: 5.0


# T-QUANTUM — Quantum-inspired layer genes
# Configures the optional quantum emulation. This is a functional analogy,
# not a claim of real quantum coherence in biological neurons.
quantum_genes:
  enabled: false
  qubits_per_neuron: 1
  default_initial_state: 0
  entanglement_fidelity_threshold: 0.5
  gate_noise: 0.0
  periodic_element_qubit_map:
    s: 1
    p: 2
    d: 2
    f: 1
    g: 1

# T173 — TFTpsp Digital-DNA block
# Each TFTpsp gene is loaded from
# ``speace_core/dna/genome/tftpsp/00_tftpsp_genome.yaml`` via the
# TFTPspGeneLibrary. The block below is a thin pointer used by the
# parser so that ``SharedGenome`` can carry the genes without
# inlining all 33 records into the default file.
tftpsp_genes:
  enabled: true
  catalog_path: "speace_core/dna/genome/tftpsp/00_tftpsp_genome.yaml"
  # When ``inline`` is non-empty the parser prefers the inline copy
  # over the catalog file. Empty by default — the catalog file is the
  # source of truth.
  inline: []
