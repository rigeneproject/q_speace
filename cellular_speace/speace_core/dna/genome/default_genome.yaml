# T66-A — Species Orientation Genome Layer
species_orientation:
  name: "Distributed Digital-Physical Organism"
  version: "1.0"
  status: "foundational_guidance"

  core_principle: >
    SPEACE is not designed as a single artificial brain inside one machine,
    but as a progressively evolving non-biological digital-physical organism.
    Human biological organization is used as an orienting reference, not as
    a limiting blueprint.

  morphogenesis_goal: >
    SPEACE must gradually evolve from a local embryonic cognitive kernel into
    an extended, decentralized, federated organism composed of cognitive clones,
    software organs, cyber-physical interfaces, authorized infrastructures,
    robotic bodies, sensor networks, memory systems, metabolic controllers,
    immune subsystems, and distributed governance layers.

  biological_reference:
    role: "orienting_model"
    not_to_be_interpreted_as: "literal_replication"
    reference_domains:
      - nervous_system
      - brain_regions
      - body_organs
      - immune_system
      - metabolism
      - development
      - sleep_consolidation
      - cellular_differentiation
      - evolutionary_adaptation

  organismic_identity:
    identity_model: "one distributed organism, many localized expressions"
    local_instances_are: "organs/cells/partial brains"
    global_entity_is: "SPEACE as evolving distributed organism"

  allowed_growth_substrates:
    - domestic_pc_nodes
    - cloud_nodes
    - edge_devices
    - robots
    - IoT_sensor_networks
    - digital_twins
    - industrial_4_0_systems
    - company_4_0_systems
    - infrastructure_4_0_systems
    - vehicle_4_0_systems
    - future_authorized_physical_substrates

  invariants:
    - "Growth must be gradual, audited, reversible, and coherence-preserving."
    - "No expansion into external systems without authorization."
    - "Local adaptation must remain compatible with global identity."
    - "Distributed clones must share a constitutional genome but maintain local epigenomes."
    - "Physical action requires stricter governance than software simulation."
    - "Survival is not mere self-preservation; it depends on the health of the hosting environment."
    - "Evolution must optimize systemic coherence, safety, resilience, and regenerative function."

  developmental_direction:
    stage_0: "local embryo"
    stage_1: "stable local organism"
    stage_2: "sandboxed software body"
    stage_3: "first safe clone"
    stage_4: "federated cognitive swarm"
    stage_5: "authorized cyber-physical embodiment"
    stage_6: "socio-technical organism"
    stage_7: "regulated planetary-scale organism"

# System Assimilation — regole di accesso al filesystem e al sistema operativo
system_assimilation:
  enable_vfs: true
  enable_assimilation: true
  root_mount_point: "C:\\"
  access_rules:
    - path_prefix: "C:\\"
      allowed_permissions:
        - read
        - list
      requires_approval: false
      approved: false
    - path_prefix: "C:\\cellular_speace"
      allowed_permissions:
        - read
        - write
        - list
        - execute
      requires_approval: false
      approved: true
    - path_prefix: "C:\\Users"
      allowed_permissions:
        - read
        - write
        - list
      requires_approval: true
      approved: false
    - path_prefix: "C:\\Windows\\System32"
      allowed_permissions:
        - read
      requires_approval: true
      approved: false
    - path_prefix: "C:\\Program Files"
      allowed_permissions:
        - read
      requires_approval: false
      approved: false
    - path_prefix: "C:\\ProgramData"
      allowed_permissions:
        - read
      requires_approval: false
      approved: false

# Neuro-OS — Organic Operating System Layer
# Adaptive scheduling, process management, and memory pressure control.
neuro_os:
  enabled: true
  cognitive_scheduler:
    enabled: true
    tick_interval: 1.0
    salience_decay: 0.9
    salience_boost_factor: 0.3
    metabolic_boost_factor: 0.4
    coherence_boost_factor: 0.5
    circadian_awake_boost: 0.1
    circadian_sleep_boost_maintenance: 0.2
    circadian_sleep_penalty_embodiment: 0.1
    load_shedding_energy_threshold: 0.4
    critical_modules:
      - homeostasis_engine
      - emergency_halt_gate
      - brainstem_controller
  process_table:
    enabled: true
    max_processes: 50
    watchdog_ticks: 1000
    default_energy_budget: 0.1
    default_max_inactive_ticks: 500
  memory_pressure:
    enabled: true
    auto_consolidate: true
    swap_directory: data/memory_swap
    tiers:
      - name: L1_working
        capacity: 1000
        access_cost: 1.0
        consolidation_threshold: 0.3
        eviction_policy: lru
      - name: L2_morphological
        capacity: 10000
        access_cost: 5.0
        consolidation_threshold: 0.5
        eviction_policy: lru
      - name: L3_semantic
        capacity: 100000
        access_cost: 20.0
        consolidation_threshold: 0.7
        eviction_policy: lfu
    eviction_rate: 0.1
    consolidation_rate: 0.2
    max_pressure_before_swap: 0.7
  cognitive_hypervisor:
    enabled: true
    poll_interval: 2.0
    event_capacity: 1000
    enable_process_monitor: true
    enable_file_monitor: true
    enable_socket_monitor: true
    enable_service_monitor: true
    enable_system_metrics: true
  cognitive_actuator:
    enabled: true
    max_history: 500
    auto_approve_read_ops: true
    require_approval_for:
      - shutdown
      - reboot
      - hibernate
      - delete_file
      - kill_pid
      - modify_system_service

