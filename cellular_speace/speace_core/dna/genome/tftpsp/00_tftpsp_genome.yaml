# T173 — TFTpsp Digital-DNA Catalogue
# ------------------------------------------------------------
# 33 genes derived from the Rigene Project TFTpsp (TFT Problem-Solving
# Parameters) catalogue. Each entry maps the descriptive parameter from
# "List of the 33 TFT problem solving.txt" to an executable Digital Gene.
#
# Encoding follows speace_core/dna/tft_gene.py:TFTGene.
#
# Conventions:
#   * gene_id      — stable symbol, format tftpsp_NNN_<short>
#   * tft_index    — 1..33, original numbering from the Rigene document
#   * priority     — 0..1 base expression (analogue: constitutive level)
#   * domain_tags  — categorical anchors used by activation conditions
#   * bcel_equivalent — name in BCELCatalog, or null when purely descriptive
#
# The catalog is intentionally read-only by default: mutation_policy.allowed
# is false everywhere, mirroring AGENTS.md §7.

tftpsp:
  enabled: true
  genes:

    # ------------------------------------------------------------ TFT-1
    - gene_id: tftpsp_001_tft
      tft_index: 1
      name: "Technological Fields Theory (TFT)"
      short_label: "TFT"
      function: >
        Reference map of the 22 major technological fields and their
        interconnections. Provides the structural substrate against which
        every other TFTpsp gene is interpreted.
      domain_tags: [technology, ontology, map]
      priority: 0.8
      activation_conditions:
        - trigger_tag: bootstrap
          boost: 1.5
        - trigger_tag: orientation
          boost: 1.2
      interactions:
        - target_gene_id: tftpsp_002_tsfrutf
          relation: supports
          weight: 0.9
        - target_gene_id: tftpsp_007_scttft
          relation: supports
          weight: 0.8
      constraints:
        - name: ontological_coherence
          invariant: coherence_preservation
          description: "Provides a stable technology-field ontology."
      bcel_equivalent: null

    # ------------------------------------------------------------ TFT-2
    - gene_id: tftpsp_002_tsfrutf
      tft_index: 2
      name: "Systemic Functional Relationship Theory of Unified Technological Fields (TSFRUTF)"
      short_label: "TSFRUTF"
      function: >
        Models inter-field relationships as a correlation graph and a
        systemic-holistic unification mechanism, allowing SPEACE to reason
        about the effects of a change in one field on the others.
      domain_tags: [technology, relations, graph]
      priority: 0.7
      activation_conditions:
        - trigger_tag: technology
          boost: 1.3
      interactions:
        - target_gene_id: tftpsp_001_tft
          relation: supports
          weight: 0.9
        - target_gene_id: tftpsp_007_scttft
          relation: supports
          weight: 0.7
      constraints:
        - name: relational_coherence
          invariant: interconnection_efficiency
          description: "Maintains consistent cross-field interaction model."
      bcel_equivalent: null

    # ------------------------------------------------------------ TFT-3
    - gene_id: tftpsp_003_tables
      tft_index: 3
      name: "TFT Tables"
      short_label: "TFT-TABLES"
      function: >
        Eight structured analysis tables (economic/social/cultural/political,
        environmental/security/privacy/ethics, consumer/market dynamics,
        innovation/R&D/regulation, workforce education, chemical/biological/
        physical/mathematical, social/economic/environmental/health problems,
        welfare/universal basic income) used to decompose projects.
      domain_tags: [analysis, method, decomposition]
      priority: 0.6
      activation_conditions:
        - trigger_tag: project_analysis
          boost: 1.4
      interactions:
        - target_gene_id: tftpsp_004_method_3_666
          relation: supports
          weight: 0.7
        - target_gene_id: tftpsp_019_pm_tft
          relation: supports
          weight: 0.6
      bcel_equivalent: null

    # ------------------------------------------------------------ TFT-4
    - gene_id: tftpsp_004_method_3_666
      tft_index: 4
      name: "Method 3-666"
      short_label: "M3-666"
      function: >
        Decomposes a problem into 3 macro-areas and each into 6 sub-areas,
        producing a 3x6 expansion with solution phases per sub-area. The
        reference decomposition pattern for any TFTpsp reasoning episode.
      domain_tags: [method, decomposition, structure]
      priority: 0.7
      activation_conditions:
        - trigger_tag: novelty
          boost: 1.4
        - trigger_tag: problem_solving
          boost: 1.3
      interactions:
        - target_gene_id: tftpsp_003_tables
          relation: depends_on
          weight: 0.6
        - target_gene_id: tftpsp_020_pcai
          relation: supports
          weight: 0.7
      constraints:
        - name: compositional_reduction
          invariant: destructive_entropy_reduction
          description: "Replaces open-ended search with bounded structural search."
      bcel_equivalent: null

    # ------------------------------------------------------------ TFT-5
    - gene_id: tftpsp_005_tftof
