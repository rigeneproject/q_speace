# Metabolic Profiles
# Energy costs per operation type, per tissue and globally.
# Version: 1.0.0

global:
  base_production_rate: 0.05        # energy units per tick from basal metabolism
  max_energy: 10.0
  initial_energy: 5.0
  heat_coefficient: 0.3             # fraction of energy consumed → heat
  cooling_rate: 0.02                # heat dissipation per tick
  crisis_threshold: 0.5             # global energy below this → crisis mode

per_operation:
  neural_synapse: 0.01
  endocrine_secrete: 0.05
  organ_publish: 0.02
  organ_subscribe: 0.01            # per subscription, per tick
  organ_sense: 0.03
  meta_integrate: 0.10
  pbm_predict: 0.08
  pbm_learn: 0.15
  bridge_check: 0.02               # per bridge, per tick
  receptor_binding: 0.005          # per active receptor, per tick

