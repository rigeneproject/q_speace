      stream: true
      event: false
      max_accumulation: 1.0
    growth_hormone:
      clearance_rate: 0.90
      delay_ticks: 3
      stream: true
      event: false
      max_accumulation: 1.0
    oxytocin:
      clearance_rate: 0.93
      delay_ticks: 3
      stream: true
      event: true
      max_accumulation: 1.0
      event_duration: 3
      event_decay: 0.85
