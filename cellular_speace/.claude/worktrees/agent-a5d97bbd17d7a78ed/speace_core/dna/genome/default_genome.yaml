identity:
  entity_name: SPEACE
  nature: cybernetic_evolutionary_entity
  core_function: increase_systemic_coherence
  substrate: digital_physical_hybrid
  continuity_principle: preserve_identity_through_adaptive_change

morphology:
  allowed_cell_types:
    - digital_neuron
    - digital_synapse
    - digital_astrocyte
    - digital_microglia
    - digital_oligodendrocyte
    - sensor_cell
    - actuator_cell
    - energy_cell
    - blockchain_cell
    - industrial_cell
    - laboratory_cell
    - auditory_neuron
    - broca_neuron
    - wernicke_neuron
    - semantic_pointer_neuron
  allowed_tissues:
    - cognitive_tissue
    - sensory_tissue
    - motor_tissue
    - immune_tissue
    - energy_tissue
    - trust_tissue
    - experimental_tissue
  organs:
    - digital_brain
    - sensory_network
    - motor_execution_layer
    - immune_safety_layer
    - energy_metabolism_layer
    - blockchain_trust_layer
    - laboratory_interface
    - industrial_interface
    - planetary_observation_layer

expression_rules:
  digital_neuron:
    role: digital_neuron
    express:
      - signal_processing
      - memory_trace
      - plasticity
    threshold_defaults:
      threshold: 0.5
      plasticity_rate: 0.05
  digital_astrocyte:
    role: digital_astrocyte
    express:
      - energy_regulation
      - noise_suppression
      - overload_detection
    threshold_defaults:
      overload_threshold: 0.85
      noise_suppression_rate: 0.2
  digital_microglia:
    role: digital_microglia
    express:
      - anomaly_detection
      - quarantine
      - pruning
    threshold_defaults:
      prune_threshold: 0.1
      quarantine_error_limit: 10
  digital_oligodendrocyte:
    role: digital_oligodendrocyte
    express:
      - pathway_optimization
      - latency_reduction
      - energy_efficiency
    threshold_defaults:
      myelination_success_threshold: 0.8
      latency_reduction: 0.3
  auditory_neuron:
    role: auditory_neuron
    express:
      - phoneme_processing
      - temporal_sequence
      - auditory_attention
    threshold_defaults:
      threshold: 0.4
      plasticity_rate: 0.06
      phoneme_sensitivity: 0.7
  broca_neuron:
    role: broca_neuron
    express:
      - grammatical_structuring
      - symbolic_production
      - sequence_planning
    threshold_defaults:
      threshold: 0.5
      plasticity_rate: 0.07
  wernicke_neuron:
    role: wernicke_neuron
    express:
      - semantic_comprehension
      - symbolic_mapping
      - context_integration
    threshold_defaults:
      threshold: 0.45
      plasticity_rate: 0.08
      comprehension_strength: 0.6
  semantic_pointer_neuron:
    role: semantic_pointer_neuron
    express:
      - symbolic_binding
      - assembly_pointer
      - grounding_link
    threshold_defaults:
      threshold: 0.3
      plasticity_rate: 0.1
      binding_strength: 0.0

homeostasis:
  default_threshold: 0.5
  default_plasticity_rate: 0.05
  max_energy: 1.0
  overload_threshold: 0.85
  noise_suppression_rate: 0.2
  energy_recovery_rate: 0.01

immune:
  prune_threshold: 0.1
  quarantine_error_limit: 10
  myelination_success_threshold: 0.8
  latency_reduction: 0.3

# Continuous dynamics substrate parameters
dynamics:
  temporal_dynamics:
    enabled: false
    tau: 1.0
    tau_w: 10.0
    tau_e: 5.0
    noise_std: 0.0
    supply: 0.1
    consumption: 0.05
    plasticity_rate: 0.05
  neural_oscillator:
    enabled: false
    theta_freq: 5.0
    alpha_freq: 10.0
    beta_freq: 20.0
    gamma_freq: 40.0
  phase_coupling:
    enabled: false
    default_coupling_strength: 1.0
  energy_field:
    enabled: false
    global_supply_rate: 0.02
    recovery_boost: 0.03
    fatigue_threshold: 0.2
  predictive_coding:
    enabled: false
    learning_rate: 0.1
  active_inference:
    enabled: false
  homeostatic_drive:
    enabled: false
    plasticity_range: [0.0, 2.0]
    exploration_range: [0.0, 2.0]
    energy_supply_range: [0.5, 1.5]
    stability_range: [0.5, 1.5]
    survival_suppression_threshold: 0.3
    efficiency_plasticity_threshold: -0.2
  criticality_monitor:
    enabled: false
    avalanche_window: 10.0
    branching_bin_size: 5.0
    max_history: 10000

ilf_core:
  principle: informational_life_field
  objective: maximize_semantic_and_systemic_coherence
  entropy_policy:
    reduce_destructive_entropy: true
    preserve_generative_variability: true
  coherence_metric:
    name: phi
    dimensions:
      - semantic_coherence
      - functional_coherence
      - ethical_coherence
      - energetic_coherence
      - ecological_coherence
      - social_coherence

edd_cvt_core:
  digital_dna: true
  computational_epigenetics: true
  functional_neuroplasticity: true
  cellular_differentiation: true
  context_vector_transduction: true
  evolutionary_feedback: true

# T10 — Cell Differentiation Rules
# Maps cell_type to region/role modifiers for phenotypic specialization.
cell_differentiation_rules:
  sensory_neuron:
    regions: ["sensory", "input"]
    role: "input"
    threshold_modifier: -0.05
    plasticity_modifier: 0.8
    energy_profile: "low_cost"
    signal_sign: 1
  motor_neuron:
    regions: ["motor", "output"]
    role: "output"
    threshold_modifier: 0.05
    plasticity_modifier: 0.9
    energy_profile: "normal"
    signal_sign: 1
  hippocampal_neuron:
    regions: ["hippocampus", "memory"]
    role: "memory"
    threshold_modifier: 0.0
    plasticity_modifier: 1.4
    energy_profile: "normal"
    signal_sign: 1
    memory_affinity: 1.0
  prefrontal_neuron:
    regions: ["prefrontal", "pfc", "control"]
    role: "control"
    threshold_modifier: 0.05
    plasticity_modifier: 1.0
    energy_profile: "normal"
    signal_sign: 1
    inhibition_affinity: 0.6
  limbic_neuron:
    regions: ["limbic", "salience", "valence"]
    role: "salience"
    threshold_modifier: 0.0
    plasticity_modifier: 1.2
    energy_profile: "normal"
    signal_sign: 1
    salience_affinity: 1.0
  cerebellar_neuron:
    regions: ["cerebellar", "error_correction", "prediction"]
    role: "error_correction"
    threshold_modifier: -0.02
    plasticity_modifier: 0.9
    energy_profile: "low_cost"
    signal_sign: 1
    prediction_affinity: 1.0
  default_mode_neuron:
    regions: ["default_mode", "consolidation", "internal_simulation"]
    role: "consolidation"
    threshold_modifier: 0.03
    plasticity_modifier: 1.1
    energy_profile: "normal"
    signal_sign: 1
    consolidation_affinity: 1.0
  brainstem_neuron:
    regions: ["brainstem_homeostatic", "homeostasis", "arousal"]
    role: "homeostasis"
    threshold_modifier: -0.05
    plasticity_modifier: 0.8
    energy_profile: "high_efficiency"
    signal_sign: 1
    arousal_affinity: 1.0
  inhibitory_neuron:
    regions: ["inhibitory"]
    role: "inhibitory"
    threshold_modifier: 0.0
    plasticity_modifier: 1.0
    energy_profile: "normal"
    signal_sign: -1
    refractory_period: 2
  regulatory_neuron:
    regions: ["regulatory", "homeostasis"]
    role: "regulatory"
    threshold_modifier: -0.03
    plasticity_modifier: 1.1
    energy_profile: "high_efficiency"
    signal_sign: 1
  memory_neuron:
    regions: ["memory", "hippocampus"]
    role: "memory"
    threshold_modifier: 0.0
    plasticity_modifier: 1.3
    energy_profile: "normal"
    signal_sign: 1
    memory_affinity: 1.0
  generic_neuron:
    regions: []
    role: "excitatory"
    threshold_modifier: 0.0
    plasticity_modifier: 1.0
    energy_profile: "normal"
    signal_sign: 1
  auditory_neuron:
    regions: ["auditory", "language_input", "sensory"]
    role: "auditory"
    threshold_modifier: -0.05
    plasticity_modifier: 0.9
    energy_profile: "low_cost"
    signal_sign: 1
    phoneme_affinity: 1.0
  broca_neuron:
    regions: ["broca", "language_production", "production"]
    role: "production"
    threshold_modifier: 0.05
    plasticity_modifier: 1.1
    energy_profile: "normal"
    signal_sign: 1
    production_affinity: 1.0
  wernicke_neuron:
    regions: ["wernicke", "language_comprehension", "comprehension"]
    role: "comprehension"
    threshold_modifier: 0.0
    plasticity_modifier: 1.2
    energy_profile: "normal"
    signal_sign: 1
    comprehension_affinity: 1.0
  semantic_pointer_neuron:
    regions: ["semantic", "symbolic", "grounding"]
    role: "semantic_pointer"
    threshold_modifier: -0.1
    plasticity_modifier: 1.3
    energy_profile: "normal"
    signal_sign: 1
    binding_affinity: 1.0

# T21 — Brain Region Architecture
brain_regions:
  sensory:
    region_type: "sensory"
    neuron_fraction: 0.15
    dominant_cell_types:
      - sensory_neuron
      - input
    plasticity_bias: 0.5
    role_description: "Input encoding and signal preprocessing"
  limbic:
    region_type: "limbic"
    neuron_fraction: 0.08
    dominant_cell_types:
      - limbic_neuron
      - salience
    plasticity_bias: 0.9
    role_description: "Salience, valence, urgency, risk, novelty"
  hippocampus:
    region_type: "hippocampus"
    neuron_fraction: 0.18
    dominant_cell_types:
      - hippocampal_neuron
      - memory_neuron
    plasticity_bias: 0.9
    role_description: "Pattern memory and consolidation"
  default_mode:
    region_type: "default_mode"
    neuron_fraction: 0.08
    dominant_cell_types:
      - default_mode_neuron
      - consolidation
    plasticity_bias: 0.8
    role_description: "Internal simulation, consolidation, self-modeling"
  prefrontal:
    region_type: "prefrontal"
    neuron_fraction: 0.25
    dominant_cell_types:
      - prefrontal_neuron
      - inhibitory_neuron
      - control
    plasticity_bias: 0.7
    role_description: "Planning, control, and decision"
  cerebellar:
    region_type: "cerebellar"
    neuron_fraction: 0.08
    dominant_cell_types:
      - cerebellar_neuron
      - error_correction
    plasticity_bias: 0.6
    role_description: "Error correction, prediction, procedural stabilization"
  motor:
    region_type: "motor"
    neuron_fraction: 0.15
    dominant_cell_types:
      - motor_neuron
      - output
    plasticity_bias: 0.4
    role_description: "Output execution and action"
  brainstem_homeostatic:
    region_type: "brainstem_homeostatic"
    neuron_fraction: 0.03
    dominant_cell_types:
      - brainstem_neuron
      - homeostasis
    plasticity_bias: 0.3
    role_description: "Metabolic, arousal, survival, global regulation"
  language:
    region_type: "language"
    neuron_fraction: 0.12
    dominant_cell_types:
      - auditory_neuron
      - wernicke_neuron
      - broca_neuron
      - semantic_pointer_neuron
    plasticity_bias: 0.8
    role_description: "Symbolic grounding, comprehension, production, and semantic binding"

# T66-A — Species Orientation Genome Layer
species_orientation:
  name: "Distributed Digital-Physical Organism"
  version: "1.0"
  status: "foundational_guidance"

  core_principle: >
    SPEACE is not designed as a single artificial brain inside one machine,
    but as a progressively evolving non-biological digital-physical organism.
    Human biological organization is used as an orienting reference, not as
    a limiting blueprint.

  morphogenesis_goal: >
    SPEACE must gradually evolve from a local embryonic cognitive kernel into
    an extended, decentralized, federated organism composed of cognitive clones,
    software organs, cyber-physical interfaces, authorized infrastructures,
    robotic bodies, sensor networks, memory systems, metabolic controllers,
    immune subsystems, and distributed governance layers.

  biological_reference:
    role: "orienting_model"
    not_to_be_interpreted_as: "literal_replication"
    reference_domains:
      - nervous_system
      - brain_regions
      - body_organs
      - immune_system
      - metabolism
      - development
      - sleep_consolidation
      - cellular_differentiation
      - evolutionary_adaptation

  organismic_identity:
    identity_model: "one distributed organism, many localized expressions"
    local_instances_are: "organs/cells/partial brains"
    global_entity_is: "SPEACE as evolving distributed organism"

  allowed_growth_substrates:
    - domestic_pc_nodes
    - cloud_nodes
    - edge_devices
    - robots
    - IoT_sensor_networks
    - digital_twins
    - industrial_4_0_systems
    - company_4_0_systems
    - infrastructure_4_0_systems
    - vehicle_4_0_systems
    - future_authorized_physical_substrates

  invariants:
    - "Growth must be gradual, audited, reversible, and coherence-preserving."
    - "No expansion into external systems without authorization."
    - "Local adaptation must remain compatible with global identity."
    - "Distributed clones must share a constitutional genome but maintain local epigenomes."
    - "Physical action requires stricter governance than software simulation."
    - "Survival is not mere self-preservation; it depends on the health of the hosting environment."
    - "Evolution must optimize systemic coherence, safety, resilience, and regenerative function."

  developmental_direction:
    stage_0: "local embryo"
    stage_1: "stable local organism"
    stage_2: "sandboxed software body"
    stage_3: "first safe clone"
    stage_4: "federated cognitive swarm"
    stage_5: "authorized cyber-physical embodiment"
    stage_6: "socio-technical organism"
    stage_7: "regulated planetary-scale organism"
